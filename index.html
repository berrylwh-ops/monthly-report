<title>悉尼商圈·月报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:#ffdc00;color:#3a4353;
  font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px;}
.wrap{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;}
.logo{width:78%;max-width:280px;margin-bottom:28px;}
.logo img{display:block;width:100%;height:auto;}
.card{width:100%;background:#fff;border-radius:22px;
  padding:40px 36px 38px;box-shadow:0 14px 44px rgba(120,90,0,.18);}
h1{font-size:20px;font-weight:700;color:#111;text-align:center;letter-spacing:.5px;}
.sub{font-size:13px;color:#9aa5b5;text-align:center;margin:10px 0 24px;}
label{display:block;font-size:13px;color:#6b7688;margin:18px 0 8px;}
input{width:100%;background:#fff;border:1.5px solid #e8e8e8;border-radius:12px;color:#111;
  font-size:15px;padding:12px 14px;outline:none;transition:border .15s, box-shadow .15s;}
input:focus{border-color:#f0c800;box-shadow:0 0 0 3px rgba(255,220,0,.32);}
button{width:100%;margin-top:28px;background:#111;color:#ffdc00;border:none;border-radius:12px;
  font-size:15px;font-weight:700;padding:14px;cursor:pointer;letter-spacing:3px;
  transition:background .15s, transform .1s;}
button:hover{background:#2a2a2a;}
button:active{transform:scale(.98);}
button:disabled{background:#8f8f8f;color:#e5e5e5;cursor:wait;}
.err{display:none;margin-top:16px;font-size:13px;color:#d64545;background:#fdf1f1;
  border-radius:10px;padding:10px 12px;text-align:center;}
.foot{margin-top:28px;font-size:11px;color:#c9c9c9;text-align:center;}
</style>

function b64ToBytes(b64){const s=atob(b64),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function gunzip(buf){
  if(typeof DecompressionStream==='undefined')throw new Error('browser-old');
  const ds=new DecompressionStream('gzip');
  const stream=new Blob([buf]).stream().pipeThrough(ds);
  return await new Response(stream).text();
}
async function doUnlock(u,p){
  const raw=b64ToBytes(PAYLOAD);
  const salt=raw.slice(0,16), iv=raw.slice(16,32), ct=raw.slice(32);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(u+':'+p),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'},km,256);
  const key=await crypto.subtle.importKey('raw',bits,{name:'AES-CBC'},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},key,ct);
  const html=await gunzip(plain);
  if(html.indexOf('<html')===-1)throw new Error('bad');
  try{sessionStorage.setItem('hp_auth',u+'\n'+p);}catch(_){}
  document.open();document.write(html);document.close();
}
async function unlock(ev){
  ev.preventDefault();
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){err.textContent='请输入账号和密码';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='解密中…';
  await new Promise(r=>setTimeout(r,30));
  try{
    await doUnlock(u,p);
  }catch(e){
    btn.disabled=false;btn.textContent='进 入';
    err.textContent=(e&&e.message==='browser-old')?'浏览器版本过旧，请更新后访问':'账号或密码错误';
    err.style.display='block';
  }
}
document.getElementById('f').addEventListener('submit',unlock);

// 同一会话内已登录过（如从月报跳到周报）→ 自动解锁。必须在 PAYLOAD 声明之后执行。
(async()=>{
  let saved=null;
  try{saved=sessionStorage.getItem('hp_auth');}catch(_){}
  if(!saved||saved.indexOf('\n')===-1)return;
  const [u,p]=saved.split('\n');
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='自动解锁中…';
  try{
    await doUnlock(u,p);
  }catch(e){
    try{sessionStorage.removeItem('hp_auth');}catch(_){}
    btn.disabled=false;btn.textContent='进 入';
  }
})();
</script>
