<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>悉尼商圈·月报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:#0f1117;color:#e0e0e0;font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:360px;background:#161a26;border:1px solid #1e2130;border-radius:14px;
  padding:36px 30px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.logo{font-size:34px;text-align:center;margin-bottom:10px;}
h1{font-size:18px;font-weight:700;color:#fff;text-align:center;}
.sub{font-size:12px;color:#888;text-align:center;margin:6px 0 26px;}
label{display:block;font-size:12px;color:#aaa;margin:14px 0 6px;}
input{width:100%;background:#1a1d2e;border:1px solid #2a2f45;border-radius:8px;color:#fff;
  font-size:15px;padding:11px 12px;outline:none;transition:border .15s;}
input:focus{border-color:#3b82f6;}
button{width:100%;margin-top:22px;background:#3b82f6;color:#fff;border:none;border-radius:8px;
  font-size:15px;font-weight:600;padding:12px;cursor:pointer;transition:background .15s;}
button:hover{background:#2563eb;}
button:disabled{background:#28304a;color:#8891ad;cursor:wait;}
.err{display:none;margin-top:14px;font-size:12.5px;color:#f87171;background:#3b1515;
  border-radius:6px;padding:9px 12px;text-align:center;}
.foot{margin-top:22px;font-size:11px;color:#555;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐼</div>
  <h1>悉尼商圈 · 月报</h1>
  <div class="sub">内容已加密，请登录查看</div>
  <form id="f">
    <label for="u">账号</label>
    <input id="u" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
    <label for="p">密码</label>
    <input id="p" type="password" autocomplete="current-password">
    <button id="btn" type="submit">进入</button>
  </form>
  <div class="err" id="err"></div>
  <div class="foot">AES-256 端到端加密 · 仅限授权访问</div>
</div>
<script>
const ITER = 300000;
function b64ToBytes(b64){const s=atob(b64),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function gunzip(buf){
  if(typeof DecompressionStream==='undefined')throw new Error('browser-old');
  const ds=new DecompressionStream('gzip');
  const stream=new Blob([buf]).stream().pipeThrough(ds);
  return await new Response(stream).text();
}
async function unlock(ev){
  ev.preventDefault();
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){err.textContent='请输入账号和密码';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='解密中…';
  await new Promise(r=>setTimeout(r,30));
  try{
    const raw=b64ToBytes(PAYLOAD);
    const salt=raw.slice(0,16), iv=raw.slice(16,32), ct=raw.slice(32);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(u+':'+p),'PBKDF2',false,['deriveBits']);
    const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'},km,256);
    const key=await crypto.subtle.importKey('raw',bits,{name:'AES-CBC'},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},key,ct);
    const html=await gunzip(plain);
    if(html.indexOf('<html')===-1)throw new Error('bad');
    document.open();document.write(html);document.close();
  }catch(e){
    btn.disabled=false;btn.textContent='进入';
    err.textContent=(e&&e.message==='browser-old')?'浏览器版本过旧，请更新后访问':'账号或密码错误';
    err.style.display='block';
  }
}
document.getElementById('f').addEventListener('submit',unlock);
